<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Diagonal Path</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    position: relative;
    background:
      linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
      linear-gradient(180deg, #3422b8 0%, #2f57d4 52%, #2368df 100%);
    background-size: 64px 64px, 64px 64px, 100% 100%;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Arial Black', sans-serif;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(#3f72eb, #3f72eb),
      linear-gradient(#2250c7, #2250c7),
      linear-gradient(#4b80f5, #4b80f5),
      linear-gradient(#2ad4f1, #2ad4f1);
    background-size: 8px 8px, 6px 6px, 7px 7px, 5px 5px;
    background-position: 14% 9%, 42% 5%, 82% 18%, 57% 24%;
    background-repeat: no-repeat;
    opacity: 0.45;
  }

  /* Block Blast style track panel — centered */
  #track-bg {
    position: fixed;
    top: 0; bottom: 0;
    background: #0b1647;
    z-index: 0;
    box-shadow: inset 0 0 0 3px #263777, 0 0 40px rgba(0,0,0,0.25);
  }

  /* Clip window for the scrolling world */
  #world-clip {
    position: fixed;
    top: 0; bottom: 0;
    overflow: hidden;
    z-index: 1;
  }

  /* The world scrolls inside the clip */
  #world {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
  }

  .cell {
    position: absolute;
    --block-face: #23c7eb;
    --block-light: #66e8ff;
    --block-side: #14a4d1;
    --block-dark: #0872a6;
    background: var(--block-face);
    border-color: var(--block-light) var(--block-side) var(--block-dark) var(--block-light);
    border-radius: 6px;
    border-style: solid;
    border-width: 5px;
    box-shadow: none;
  }

  .board-cell {
    position: absolute;
    width: var(--cell-size);
    height: var(--cell-size);
    border-radius: 6px;
    background: #101c4a;
    border: 1px solid rgba(116, 164, 255, 0.08);
    z-index: 1;
  }

  .cell-red {
    --block-face: #f13631;
    --block-light: #ff746d;
    --block-side: #c92027;
    --block-dark: #941018;
    z-index: 10;
    animation: hazard-pulse 1.5s ease-in-out infinite;
  }

  @keyframes hazard-pulse {
    0%, 100% { transform: scale(1); filter: brightness(1); }
    50% { transform: scale(1.04); filter: brightness(1.16); }
  }

  .cell-trail {
    --block-face: #3368ec;
    --block-light: #6597ff;
    --block-side: #2350c8;
    --block-dark: #18379a;
    z-index: 5;
    animation: trail-fade 0.3s ease-out;
  }

  .coin {
    position: absolute;
    border-radius: 50%;
    z-index: 35;
    background: #ffd83a;
    border: 3px solid #f7a900;
    box-shadow: none;
    animation: coin-wobble 1.1s ease-in-out infinite;
  }

  .coin::before {
    content: "";
    position: absolute;
    inset: 22%;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.45);
    border-left-color: rgba(185,98,0,0.35);
    border-bottom-color: rgba(185,98,0,0.35);
    box-shadow: none;
  }

  .coin.collected {
    animation: coin-collect 0.22s ease-out forwards;
  }

  @keyframes coin-wobble {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-3px) scale(1.06); }
  }

  @keyframes coin-collect {
    to { opacity: 0; transform: translateY(-18px) scale(1.45) rotate(18deg); }
  }

  @keyframes trail-fade {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  /* Player: fixed on screen — Y never changes, only X moves */
  #player {
    position: fixed;
    border-radius: 8px;
    background: #23c7eb;
    border-color: #66e8ff #14a4d1 #0872a6 #66e8ff;
    border-style: solid;
    border-width: 5px;
    box-shadow: none;
    z-index: 100;
    pointer-events: none;
    transition: transform 0.1s;
  }

  #player.moving {
    animation: player-bounce 0.3s ease-out;
  }

  @keyframes player-bounce {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  #controls {
    position: fixed;
    bottom: 44px;
    left: 0; width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 28px;
    z-index: 200;
    pointer-events: none;
  }

  .arrow-btn {
    width: 75px; height: 75px;
    border-radius: 14px;
    background: linear-gradient(180deg, #ffd94d 0%, #ff9f13 58%, #e35c11 100%);
    border: 3px solid #ffe985;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; pointer-events: all;
    box-shadow:
      inset 0 5px 0 rgba(255,255,255,0.38),
      inset 0 -6px 0 rgba(148,55,0,0.28),
      0 7px 18px rgba(0, 20, 90, 0.35);
    -webkit-tap-highlight-color: transparent;
    transition: all 0.12s;
  }
  .arrow-btn:active { 
    transform: scale(0.85); 
    background: linear-gradient(180deg, #31ddf5 0%, #1d9be0 100%);
    box-shadow: 0 0 22px rgba(49, 221, 245, 0.55);
  }
  .arrow-btn svg { width: 35px; height: 35px; }
  .arrow-btn svg polyline { stroke: #fff; filter: drop-shadow(0 2px 0 rgba(0,0,0,0.22)); }

  #hud {
    position: fixed;
    top: 20px; left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(180deg, rgba(35, 93, 221, 0.96) 0%, rgba(31, 65, 185, 0.96) 100%);
    border: 3px solid rgba(116, 164, 255, 0.72);
    border-radius: 12px;
    padding: 9px 18px;
    font-size: 16px; font-weight: 900; color: #fff;
    z-index: 200;
    backdrop-filter: blur(10px);
    white-space: nowrap;
    box-shadow:
      inset 0 4px 0 rgba(255,255,255,0.16),
      0 5px 16px rgba(0, 20, 90, 0.32);
    display: flex;
    gap: 18px;
    align-items: center;
  }

  #hud .stat { display: flex; flex-direction: column; align-items: center; }
  #hud .label { font-size: 10px; opacity: 0.78; font-weight: 700; }
  #hud .value { font-size: 18px; text-shadow: 0 2px 0 rgba(0,0,0,0.22); }
  #hud .highlight { color: #ffd83a; }
  #coinVal { color: #ffd83a; }

  #gameover {
    display: none;
    position: fixed; inset: 0;
    background: rgba(18, 28, 115, 0.82);
    z-index: 300;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 20px;
    backdrop-filter: blur(8px);
  }
  #gameover.show { display: flex; animation: gameover-appear 0.3s ease-out; }
  
  @keyframes gameover-appear {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  #gameover h2 { 
    color: #fff; 
    font-size: 3rem; 
    font-weight: 900;
    text-shadow: 0 4px 20px rgba(0,0,0,0.5);
    animation: title-glow 2s ease-in-out infinite;
  }

  @keyframes title-glow {
    0%, 100% { text-shadow: 0 4px 20px rgba(255,107,107,0.5); }
    50% { text-shadow: 0 4px 40px rgba(255,107,107,0.9), 0 0 60px rgba(255,107,107,0.6); }
  }

  #gameover p { color: rgba(255,255,255,0.9); font-size: 1.3rem; font-weight: 700; }
  #gameover .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(88px, 1fr));
    gap: 15px;
    margin: 10px 0;
  }
  #gameover .stat-box {
    background: linear-gradient(180deg, rgba(47, 102, 224, 0.85) 0%, rgba(30, 61, 171, 0.85) 100%);
    padding: 15px 25px;
    border-radius: 10px;
    backdrop-filter: blur(10px);
    border: 2px solid rgba(116, 164, 255, 0.72);
    box-shadow: inset 0 4px 0 rgba(255,255,255,0.15), 0 6px 15px rgba(0,0,0,0.18);
  }
  #gameover .stat-box .label { font-size: 0.9rem; color: #fff; opacity: 0.9; }
  #gameover .stat-box .value { font-size: 1.8rem; color: #fff; font-weight: 900; }

  #restartBtn {
    margin-top: 15px; 
    padding: 18px 55px;
    border-radius: 14px; 
    background: linear-gradient(180deg, #2ee35b 0%, #1cc843 56%, #108c2b 100%);
    color: #fff; 
    font-size: 1.2rem; 
    font-weight: 900;
    border: none; 
    cursor: pointer;
    box-shadow: inset 0 5px 0 rgba(255,255,255,0.35), inset 0 -6px 0 rgba(0,82,20,0.28), 0 7px 20px rgba(0,0,0,0.25);
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  #restartBtn:hover { transform: translateY(-2px); box-shadow: inset 0 5px 0 rgba(255,255,255,0.35), inset 0 -6px 0 rgba(0,82,20,0.28), 0 9px 26px rgba(0,0,0,0.3); }
  #restartBtn:active { transform: scale(0.95); }

  @keyframes shake {
    0%,100% { transform: translate(0,0); }
    10% { transform: translate(-12px, 3px) rotate(-2deg); }
    20% { transform: translate(12px, -3px) rotate(2deg); }
    30% { transform: translate(-10px, 2px) rotate(-1deg); }
    40% { transform: translate(10px, -2px) rotate(1deg); }
    50% { transform: translate(-8px, 1px) rotate(-1deg); }
    60% { transform: translate(8px, -1px) rotate(1deg); }
    70% { transform: translate(-5px, 1px); }
    80% { transform: translate(5px, -1px); }
    90% { transform: translate(-2px, 0); }
  }
  .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97); }

  /* ── Timer bar ── */
  #timer-wrap {
    position: fixed;
    top: 75px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 0;
  }
  #timer-track {
    width: 200px;
    height: 12px;
    background: rgba(11, 28, 122, 0.55);
    border: 2px solid rgba(116, 164, 255, 0.62);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
  }
  #timer-bar {
    height: 100%;
    width: 100%;
    border-radius: 6px;
    background: linear-gradient(90deg, #2ee35b 0%, #ffd83a 100%);
    transform-origin: left center;
    transition: background 0.3s;
    box-shadow: 0 0 13px rgba(46, 227, 91, 0.48);
  }
  #timer-bar.warn { 
    background: linear-gradient(90deg, #ffd83a 0%, #ff9f13 100%);
    box-shadow: 0 0 15px rgba(255, 159, 19, 0.58);
  }
  #timer-bar.danger { 
    background: linear-gradient(90deg, #ff5147 0%, #ee261e 100%);
    animation: timer-pulse 0.5s ease-in-out infinite;
    box-shadow: 0 0 20px rgba(238, 38, 30, 0.78);
  }

  @keyframes timer-pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(238, 38, 30, 0.78); }
    50% { box-shadow: 0 0 30px rgba(255, 81, 71, 0.95); }
  }

  /* Combo display */
  #combo {
    position: fixed;
    top: 125px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 201;
    background: linear-gradient(180deg, rgba(255,216,58,0.98) 0%, rgba(255,159,19,0.98) 100%);
    padding: 8px 20px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    box-shadow: inset 0 4px 0 rgba(255,255,255,0.35), 0 5px 15px rgba(255,140,0,0.5);
    display: none;
    animation: combo-bounce 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  }

  #combo.show { display: block; }

  @keyframes combo-bounce {
    0% { transform: translateX(-50%) scale(0); }
    50% { transform: translateX(-50%) scale(1.2); }
    100% { transform: translateX(-50%) scale(1); }
  }

  /* Score popup */
  .score-popup {
    position: fixed;
    font-size: 28px;
    font-weight: 900;
    color: #ffd83a;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    pointer-events: none;
    z-index: 150;
    animation: score-float 1s ease-out forwards;
  }

  @keyframes score-float {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    50% { opacity: 1; transform: translateY(-30px) scale(1.3); }
    100% { opacity: 0; transform: translateY(-70px) scale(0.8); }
  }

  /* Particles */
  .particle {
    position: fixed;
    width: 9px;
    height: 9px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 90;
  }

  @keyframes particle-burst {
    0% { opacity: 1; transform: translate(0, 0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
  }
</style>
</head>
<body>

<div id="track-bg"></div>
<div id="world-clip">
  <div id="world"></div>
</div>

<div id="hud">
  <div class="stat">
    <div class="label">SCORE</div>
    <div class="value highlight" id="scoreVal">0</div>
  </div>
  <div class="stat">
    <div class="label">BEST</div>
    <div class="value" id="bestVal">0</div>
  </div>
  <div class="stat">
    <div class="label">COINS</div>
    <div class="value" id="coinVal">0</div>
  </div>
</div>

<div id="timer-wrap">
  <div id="timer-track">
    <div id="timer-bar"></div>
  </div>
</div>

<div id="combo"></div>

<div id="controls">
  <button class="arrow-btn" id="btnLeft">
    <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="3"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>
  <button class="arrow-btn" id="btnRight">
    <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="3"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
  </button>
</div>

<div id="player"></div>

<div id="gameover">
  <h2>GAME OVER</h2>
  <div class="stats-grid">
    <div class="stat-box">
      <div class="label">SCORE</div>
      <div class="value" id="finalScore">0</div>
    </div>
    <div class="stat-box">
      <div class="label">COINS</div>
      <div class="value" id="finalCoins">0</div>
    </div>
    <div class="stat-box">
      <div class="label">BEST COMBO</div>
      <div class="value" id="finalCombo">0</div>
    </div>
  </div>
  <p id="newBestMsg" style="display: none; color: #FFD83A; font-size: 1.5rem;">NEW HIGH SCORE!</p>
  <button id="restartBtn">Play Again</button>
</div>

<script>

// ════════════════════════════════════════════
//  AUDIO ENGINE
// ════════════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, type, dur, vol = 0.3, detune = 0) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.type = type;
    osc.frequency.value = freq;
    osc.detune.value = detune;

    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);

    osc.start();
    osc.stop(ctx.currentTime + dur);
  } catch (e) {}
}

function sfxMove() {
  playTone(440 + comboCount * 30, 'sine', 0.08, 0.15);
}

function sfxCombo() {
  playTone(660, 'triangle', 0.12, 0.2);
}

function sfxCoin(count = 1) {
  const notes = [988, 1175, 1397, 1760];
  for (let i = 0; i < Math.min(count, notes.length); i++) {
    setTimeout(() => {
      playTone(notes[i], 'triangle', 0.09, 0.16);
      playTone(notes[i] * 2, 'sine', 0.05, 0.06);
    }, i * 45);
  }
}

function sfxDeath() {
  playTone(200, 'sawtooth', 0.3, 0.35);
  setTimeout(() => playTone(150, 'sawtooth', 0.3, 0.3), 100);
  setTimeout(() => playTone(100, 'sawtooth', 0.4, 0.3), 220);
}

function sfxNewBest() {
  [523, 659, 784, 988, 1175, 1568].forEach((f, i) =>
    setTimeout(() => playTone(f, 'sine', 0.18, 0.25), i * 60)
  );
}

// ════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════
const COLS           = 5;
const GAP            = 4;
const TOTAL_ROWS     = 400;
const BASE_MOVE_MS   = 200;
const HAZARD_PERIOD  = 5;
const HAZARD_OFFSET  = 6;
const HAZARD_LOOKAHEAD_ROWS = 80;
const ROW_CLEANUP_BEHIND = 80;
const COIN_PERIOD    = 4;
const COIN_OFFSET    = 10;
const COIN_CHANCE    = 0.58;
const COIN_POINTS    = 10;

// Camera trigger: world starts scrolling once player reaches this fraction from top
const CAM_TRIGGER_FRAC = 0.50;

// ════════════════════════════════════════════
//  TIMER BAR CONFIG
// ════════════════════════════════════════════
const TIMER_MAX      = 100;
const BASE_TIMER_DRAIN = 22;
const MAX_TIMER_DRAIN  = 62;
const TIMER_REFILL   = 35;

// ════════════════════════════════════════════
//  COMBO SYSTEM
// ════════════════════════════════════════════
const COMBO_TIMEOUT  = 1500;  // ms to maintain combo
let comboCount       = 0;
let comboTimer       = null;
let maxCombo         = 0;
let lastComboMove    = null;  // Tracks consecutive diagonal/forward streaks

// ════════════════════════════════════════════
//  PROGRESSIVE DIFFICULTY
// ════════════════════════════════════════════
let currentSpeed     = BASE_MOVE_MS;
let currentDrain     = BASE_TIMER_DRAIN;

// ════════════════════════════════════════════
//  LAYOUT  (grid centered)
// ════════════════════════════════════════════
let CELL_SIZE, ROW_H, GRID_W, GRID_LEFT;

function computeLayout() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  const visibleAbove = vh * CAM_TRIGGER_FRAC;
  const byHeight = Math.floor(visibleAbove / 22) - GAP;
  const byWidth  = Math.floor((vw * 0.86 - GAP * (COLS + 1)) / COLS);
  CELL_SIZE = Math.max(Math.min(byHeight, byWidth), 30);
  ROW_H     = CELL_SIZE + GAP;
  GRID_W    = COLS * (CELL_SIZE + GAP) + GAP;
  GRID_LEFT = Math.round((vw - GRID_W) / 2);
}
computeLayout();

const cellX  = col => GAP + col * (CELL_SIZE + GAP);
const rowToY = row => GAP + row * ROW_H;
const worldH = ()  => GAP + TOTAL_ROWS * ROW_H;
const screenX = col => GRID_LEFT + cellX(col);

// ════════════════════════════════════════════
//  HAZARD MAP - Smart Random Generation
// ════════════════════════════════════════════
const hazards = new Set();
const hazardEls = {};
let nextHazardRow = TOTAL_ROWS - 1 - HAZARD_OFFSET;
let lastHazardSide = null;
let secondLastHazardSide = null;

function pickHazardSide() {
  let side;

  // FAIRNESS RULE: If last 2 hazards were on the same side, force opposite
  if (lastHazardSide !== null && lastHazardSide === secondLastHazardSide) {
    side = 1 - lastHazardSide;
  } 
  // CHALLENGE: 30% chance to keep same side (creates pressure)
  else if (lastHazardSide !== null && Math.random() < 0.3) {
    side = lastHazardSide;
  }
  // DEFAULT: Random choice
  else {
    side = Math.random() < 0.5 ? 0 : 1;
  }

  secondLastHazardSide = lastHazardSide;
  lastHazardSide = side;
  return side;
}

function addHazard(col, row) {
  const key = `${col},${row}`;
  if (hazards.has(key)) return;

  hazards.add(key);
  const el = document.createElement('div');
  el.className = 'cell cell-red';
  el.dataset.row = row;
  el.style.cssText = `width:${CELL_SIZE}px;height:${CELL_SIZE}px;left:${cellX(col)}px;top:${rowToY(row)}px;`;
  worldEl.appendChild(el);
  hazardEls[key] = el;
}

function generateHazardsUntil(minRow) {
  while (nextHazardRow >= minRow) {
    const side = pickHazardSide();
    const col = side === 0 ? 0 : COLS - 1;
    addHazard(col, nextHazardRow);
    nextHazardRow -= HAZARD_PERIOD;
  }
}

function resetHazards() {
  hazards.clear();
  Object.keys(hazardEls).forEach(key => delete hazardEls[key]);
  nextHazardRow = TOTAL_ROWS - 1 - HAZARD_OFFSET;
  lastHazardSide = null;
  secondLastHazardSide = null;
  generateHazardsUntil(0);
}

// ════════════════════════════════════════════
//  COINS
// ════════════════════════════════════════════
const coins = new Set();
const coinEls = {};
let nextCoinRow = TOTAL_ROWS - 1 - COIN_OFFSET;

function addCoin(col, row) {
  const key = `${col},${row}`;
  if (coins.has(key) || hazards.has(key)) return;

  const size = Math.max(18, Math.round(CELL_SIZE * 0.48));
  const inset = Math.round((CELL_SIZE - size) / 2);
  coins.add(key);

  const el = document.createElement('div');
  el.className = 'coin';
  el.style.cssText = `width:${size}px;height:${size}px;left:${cellX(col) + inset}px;top:${rowToY(row) + inset}px;`;
  worldEl.appendChild(el);
  coinEls[key] = el;
}

function generateCoinsUntil(minRow) {
  while (nextCoinRow >= minRow) {
    if (Math.random() < COIN_CHANCE) {
      const col = Math.floor(Math.random() * COLS);
      addCoin(col, nextCoinRow);
    }
    nextCoinRow -= COIN_PERIOD;
  }
}

function resetCoins() {
  coins.clear();
  Object.keys(coinEls).forEach(key => delete coinEls[key]);
  nextCoinRow = TOTAL_ROWS - 1 - COIN_OFFSET;
  generateCoinsUntil(0);
}

function generateWorldUntil(minRow) {
  generateHazardsUntil(minRow);
  generateCoinsUntil(minRow);
}

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
let playerCol, playerRow;
let worldScrollY = 0;
let isMoving = false;
let isDead   = false;
let score    = 0;
let coinsCollected = 0;
let highScore = parseInt(localStorage.getItem('diagonalPathBest') || '0');

let timerVal     = TIMER_MAX;
let timerRaf     = null;
let timerLastTs  = null;

const worldEl  = document.getElementById('world');
const clipEl   = document.getElementById('world-clip');
const trackBg  = document.getElementById('track-bg');
const playerEl = document.getElementById('player');
const scoreEl  = document.getElementById('scoreVal');
const coinEl   = document.getElementById('coinVal');
const bestEl   = document.getElementById('bestVal');
const goEl     = document.getElementById('gameover');
const finalEl  = document.getElementById('finalScore');
const finalCoinsEl = document.getElementById('finalCoins');
const finalComboEl = document.getElementById('finalCombo');
const timerBar = document.getElementById('timer-bar');
const comboEl  = document.getElementById('combo');
const newBestMsg = document.getElementById('newBestMsg');

let trailEls = {};
let boardEls = {};

function renderBoardCellsAround(row) {
  const firstRow = row - HAZARD_LOOKAHEAD_ROWS - 8;
  const lastRow = Math.min(TOTAL_ROWS - 1, row + ROW_CLEANUP_BEHIND);

  for (let r = firstRow; r <= lastRow; r++) {
    for (let c = 0; c < COLS; c++) {
      const key = `${c},${r}`;
      if (boardEls[key]) continue;

      const el = document.createElement('div');
      el.className = 'board-cell';
      el.style.cssText = `--cell-size:${CELL_SIZE}px;left:${cellX(c)}px;top:${rowToY(r)}px;`;
      worldEl.appendChild(el);
      boardEls[key] = el;
    }
  }
}

// ════════════════════════════════════════════
//  TIMER BAR
// ════════════════════════════════════════════
function updateTimerUI() {
  const pct = Math.max(0, timerVal / TIMER_MAX);
  timerBar.style.transform = `scaleX(${pct})`;
  timerBar.classList.toggle('warn',   pct <= 0.5 && pct > 0.25);
  timerBar.classList.toggle('danger', pct <= 0.25);
}

function timerTick(ts) {
  if (isDead) return;
  if (timerLastTs === null) timerLastTs = ts;
  const dt = (ts - timerLastTs) / 1000;
  timerLastTs = ts;

  timerVal = Math.max(0, timerVal - currentDrain * dt);
  updateTimerUI();

  if (timerVal <= 0) {
    triggerDeath();
    return;
  }
  timerRaf = requestAnimationFrame(timerTick);
}

function startTimer() {
  if (timerRaf) cancelAnimationFrame(timerRaf);
  timerLastTs = null;
  timerRaf = requestAnimationFrame(timerTick);
}

function stopTimer() {
  if (timerRaf) { cancelAnimationFrame(timerRaf); timerRaf = null; }
}

function refillTimer() {
  timerVal = Math.min(TIMER_MAX, timerVal + TIMER_REFILL);
  updateTimerUI();
}

// ════════════════════════════════════════════
//  COMBO SYSTEM
// ════════════════════════════════════════════
function resetCombo() {
  comboCount = 0;
  lastComboMove = null;
  if (comboTimer) {
    clearTimeout(comboTimer);
    comboTimer = null;
  }
  comboEl.classList.remove('show');
}

function increaseCombo(moveKind) {
  // Combo only grows when the player repeats the same move type:
  // - consecutive diagonals, or
  // - consecutive straight-forward edge moves.
  // Switching between diagonal and forward breaks the combo.
  if (lastComboMove === moveKind) {
    comboCount++;
  } else {
    comboCount = 1;
    comboEl.classList.remove('show');
  }

  lastComboMove = moveKind;
  maxCombo = Math.max(maxCombo, comboCount);
  
  if (comboTimer) clearTimeout(comboTimer);
  
  if (comboCount >= 3) {
    comboEl.textContent = `${comboCount}x COMBO!`;
    comboEl.classList.add('show');
    comboEl.style.animation = 'none';
    setTimeout(() => comboEl.style.animation = '', 10);
    sfxCombo();
  }
  
  comboTimer = setTimeout(resetCombo, COMBO_TIMEOUT);
}

function getComboMultiplier() {
  if (comboCount < 3) return 1;
  if (comboCount < 5) return 2;
  if (comboCount < 10) return 3;
  return 5;
}

// ════════════════════════════════════════════
//  PROGRESSIVE DIFFICULTY
// ════════════════════════════════════════════
function updateDifficulty() {
  // Speed increases every 20 points
  currentSpeed = Math.max(120, BASE_MOVE_MS - Math.floor(score / 20) * 10);
  // Drain increases every 30 points, then plateaus so endless runs remain possible
  currentDrain = Math.min(MAX_TIMER_DRAIN, BASE_TIMER_DRAIN + Math.floor(score / 30) * 3);
}

// ════════════════════════════════════════════
//  PARTICLES
// ════════════════════════════════════════════
function createParticles(x, y, count = 12) {
  const colors = ['#ff5147', '#ff9f13', '#ffd83a', '#2ee35b', '#28d8f4', '#9b52e0', '#3e6dff'];
  for (let i = 0; i < count; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = x + 'px';
    particle.style.top = y + 'px';
    particle.style.background = colors[Math.floor(Math.random() * colors.length)];
    
    const angle = (Math.PI * 2 * i) / count;
    const distance = 50 + Math.random() * 50;
    const tx = Math.cos(angle) * distance;
    const ty = Math.sin(angle) * distance;
    
    particle.style.setProperty('--tx', tx + 'px');
    particle.style.setProperty('--ty', ty + 'px');
    particle.style.animation = `particle-burst ${0.6 + Math.random() * 0.4}s ease-out forwards`;
    
    document.body.appendChild(particle);
    setTimeout(() => particle.remove(), 1000);
  }
}

// ════════════════════════════════════════════
//  SCORE POPUP
// ════════════════════════════════════════════
function showScorePopup(points, x, y) {
  const popup = document.createElement('div');
  popup.className = 'score-popup';
  popup.textContent = '+' + points;
  popup.style.left = x + 'px';
  popup.style.top = y + 'px';
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 1000);
}

function showCoinPopup(count, x, y) {
  const popup = document.createElement('div');
  popup.className = 'score-popup';
  popup.textContent = `+${count} COIN${count > 1 ? 'S' : ''}`;
  popup.style.left = x + 'px';
  popup.style.top = y + 'px';
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 1000);
}

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
function init() {
  computeLayout();

  worldEl.innerHTML = '';
  trailEls = {};
  boardEls = {};

  trackBg.style.left  = GRID_LEFT + 'px';
  trackBg.style.width = GRID_W + 'px';
  clipEl.style.left   = GRID_LEFT + 'px';
  clipEl.style.width  = GRID_W + 'px';

  worldEl.style.width      = GRID_W + 'px';
  worldEl.style.height     = worldH() + 'px';
  worldEl.style.transition = 'none';
  worldEl.style.top        = '0px';

  playerCol    = 2;
  playerRow    = TOTAL_ROWS - 1;
  worldScrollY = 0;
  isMoving     = false;
  isDead       = false;
  score        = 0;
  coinsCollected = 0;
  comboCount   = 0;
  maxCombo     = 0;
  lastComboMove = null;
  if (comboTimer) { clearTimeout(comboTimer); comboTimer = null; }
  currentSpeed = BASE_MOVE_MS;
  currentDrain = BASE_TIMER_DRAIN;
  
  scoreEl.textContent = '0';
  coinEl.textContent = '0';
  bestEl.textContent = highScore;
  goEl.classList.remove('show');
  comboEl.classList.remove('show');
  newBestMsg.style.display = 'none';

  playerEl.style.width      = CELL_SIZE + 'px';
  playerEl.style.height     = CELL_SIZE + 'px';
  playerEl.style.background = '#23c7eb';
  playerEl.style.borderColor = '#66e8ff #14a4d1 #0872a6 #66e8ff';
  playerEl.style.boxShadow  = 'none';
  playerEl.style.transition = 'none';
  playerEl.classList.remove('moving');

  resetHazards();
  resetCoins();
  renderBoardCellsAround(playerRow);

  const vh = window.innerHeight;
  const startScreenY = vh - CELL_SIZE - 20;
  worldScrollY = rowToY(playerRow) - startScreenY;
  worldEl.style.top = -worldScrollY + 'px';

  playerEl.style.left = screenX(playerCol) + 'px';
  playerEl.style.top  = startScreenY + 'px';

  placeTrail(playerCol, playerRow);

  stopTimer();
  timerVal = TIMER_MAX;
  updateTimerUI();
  startTimer();
}

// ════════════════════════════════════════════
//  TRAIL
// ════════════════════════════════════════════
function placeTrail(col, row) {
  const key = `${col},${row}`;
  if (trailEls[key]) return;
  const el = document.createElement('div');
  el.className = 'cell cell-trail';
  el.style.cssText = `width:${CELL_SIZE}px;height:${CELL_SIZE}px;left:${cellX(col)}px;top:${rowToY(row)}px;`;
  worldEl.appendChild(el);
  trailEls[key] = el;
}

function cleanupRowsBehind(row) {
  const cutoff = row + ROW_CLEANUP_BEHIND;

  Object.keys(trailEls).forEach(key => {
    const trailRow = Number(key.split(',')[1]);
    if (trailRow > cutoff) {
      trailEls[key].remove();
      delete trailEls[key];
    }
  });

  Object.keys(hazardEls).forEach(key => {
    const hazardRow = Number(key.split(',')[1]);
    if (hazardRow > cutoff) {
      hazards.delete(key);
      hazardEls[key].remove();
      delete hazardEls[key];
    }
  });

  Object.keys(coinEls).forEach(key => {
    const coinRow = Number(key.split(',')[1]);
    if (coinRow > cutoff) {
      coins.delete(key);
      coinEls[key].remove();
      delete coinEls[key];
    }
  });

  Object.keys(boardEls).forEach(key => {
    const boardRow = Number(key.split(',')[1]);
    if (boardRow > cutoff) {
      boardEls[key].remove();
      delete boardEls[key];
    }
  });
}

function placeTrailPath(fromCol, fromRow, colDelta, steps) {
  let c = fromCol, r = fromRow;
  for (let i = 0; i < steps; i++) {
    c = Math.max(0, Math.min(COLS - 1, c + colDelta));
    placeTrail(c, --r);
  }
}

function collectCoinsAlongPath(fromCol, fromRow, colDelta, steps) {
  let collected = 0;
  let c = fromCol, r = fromRow;

  for (let i = 0; i < steps; i++) {
    c = Math.max(0, Math.min(COLS - 1, c + colDelta));
    r--;

    const key = `${c},${r}`;
    if (!coins.has(key)) continue;

    coins.delete(key);
    collected++;

    const el = coinEls[key];
    delete coinEls[key];
    if (el) {
      el.classList.add('collected');
      setTimeout(() => el.remove(), 220);
    }
  }

  return collected;
}

// ════════════════════════════════════════════
//  MOVEMENT
// ════════════════════════════════════════════
function movePlayer(dir) {
  if (isMoving || isDead) return;

  const onRight = playerCol === COLS - 1;
  const onLeft  = playerCol === 0;
  const forward = (dir === 'right' && onRight) || (dir === 'left' && onLeft);

  let colDelta, totalSteps;
  const moveKind = forward ? 'forward' : 'diagonal';

  if (forward) {
    colDelta = 0; totalSteps = 4;
  } else {
    colDelta   = dir === 'right' ? 1 : -1;
    totalSteps = dir === 'right' ? (COLS - 1 - playerCol) : playerCol;
    if (totalSteps === 0) { colDelta = 0; totalSteps = 4; }
  }

  generateWorldUntil(playerRow - totalSteps - HAZARD_LOOKAHEAD_ROWS);
  renderBoardCellsAround(playerRow - totalSteps);

  let hitStep = -1;
  let c = playerCol, r = playerRow;
  for (let i = 0; i < totalSteps; i++) {
    c = Math.max(0, Math.min(COLS - 1, c + colDelta));
    r--;
    if (hazards.has(`${c},${r}`)) { hitStep = i + 1; break; }
  }

  const steps   = hitStep > 0 ? hitStep : totalSteps;
  const destCol = Math.max(0, Math.min(COLS - 1, playerCol + colDelta * steps));
  const destRow = playerRow - steps;
  const dur     = Math.round(currentSpeed * steps / totalSteps);
  const collectedCoins = collectCoinsAlongPath(playerCol, playerRow, colDelta, steps);

  isMoving = true;
  playerEl.classList.add('moving');
  refillTimer();
  increaseCombo(moveKind);
  sfxMove();
  if (collectedCoins > 0) sfxCoin(collectedCoins);
  placeTrailPath(playerCol, playerRow, colDelta, steps);

  // Particles from current position
  const currentX = screenX(playerCol) + CELL_SIZE / 2;
  const currentY = parseFloat(playerEl.style.top) + CELL_SIZE / 2;
  createParticles(currentX, currentY, 8);

  const vh      = window.innerHeight;
  const camLine = vh * CAM_TRIGGER_FRAC;
  const ease    = `${dur}ms cubic-bezier(0.3,0,0.2,1)`;

  const destWorldY         = rowToY(destRow);
  const destScreenNoScroll = destWorldY - worldScrollY;
  const needScroll = destScreenNoScroll < camLine;

  if (needScroll) {
    worldScrollY = destWorldY - camLine;
    worldEl.style.transition = `top ${ease}`;
    worldEl.style.top = -worldScrollY + 'px';
  }

  const toX       = screenX(destCol);
  const toScreenY = needScroll ? camLine : destScreenNoScroll;

  playerEl.style.transition = `left ${ease}, top ${ease}`;
  playerEl.getBoundingClientRect();
  playerEl.style.left = toX + 'px';
  playerEl.style.top  = toScreenY + 'px';

  setTimeout(() => {
    playerEl.style.transition = 'none';
    worldEl.style.transition  = 'none';
    playerEl.classList.remove('moving');
    playerCol = destCol;
    playerRow = destRow;
    cleanupRowsBehind(playerRow);
    
    const multiplier = getComboMultiplier();
    const movePoints = (steps + 1) * multiplier;
    const coinBonus = collectedCoins * COIN_POINTS;
    const points = movePoints + coinBonus;
    coinsCollected += collectedCoins;
    score += points;
    
    scoreEl.textContent = score;
    coinEl.textContent = coinsCollected;
    
    // Show score popup
    const popupX = toX + CELL_SIZE / 2;
    const popupY = toScreenY + CELL_SIZE / 2;
    showScorePopup(points, popupX, popupY);
    if (collectedCoins > 0) showCoinPopup(collectedCoins, popupX, popupY - CELL_SIZE * 0.55);
    
    // Update difficulty
    updateDifficulty();
    
    isMoving = false;
    if (hitStep > 0) triggerDeath();
  }, dur);
}

// ════════════════════════════════════════════
//  DEATH
// ════════════════════════════════════════════
function triggerDeath() {
  if (isDead) return;
  isDead = true;
  stopTimer();
  sfxDeath();
  
  // Screen shake
  document.body.classList.add('shake');
  
  // Update high score
  const isNewBest = score > highScore;
  if (isNewBest) {
    highScore = score;
    localStorage.setItem('diagonalPathBest', highScore);
    newBestMsg.style.display = 'block';
    sfxNewBest();
  }
  
  playerEl.style.transition = 'background 0.2s, border-color 0.2s';
  playerEl.style.background = '#f13631';
  playerEl.style.borderColor = '#ff746d #c92027 #941018 #ff746d';
  playerEl.style.boxShadow  = 'none';
  
  setTimeout(() => {
    document.body.classList.remove('shake');
    finalEl.textContent = score;
    finalCoinsEl.textContent = coinsCollected;
    finalComboEl.textContent = maxCombo;
    goEl.classList.add('show');
  }, 700);
}

// ════════════════════════════════════════════
//  INPUT
// ════════════════════════════════════════════
document.getElementById('btnLeft').addEventListener('pointerdown',  e => { e.preventDefault(); movePlayer('left');  });
document.getElementById('btnRight').addEventListener('pointerdown', e => { e.preventDefault(); movePlayer('right'); });

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  movePlayer('left');
  if (e.key === 'ArrowRight') movePlayer('right');
});

let _tx = 0;
document.addEventListener('touchstart', e => { _tx = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend',   e => {
  if (Math.abs(e.changedTouches[0].clientX - _tx) > 32)
    movePlayer(e.changedTouches[0].clientX > _tx ? 'right' : 'left');
}, { passive: true });

document.getElementById('restartBtn').addEventListener('click', init);

// ════════════════════════════════════════════
//  START
// ════════════════════════════════════════════
bestEl.textContent = highScore;
init();
</script>
</body>
